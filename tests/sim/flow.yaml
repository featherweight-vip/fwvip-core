
# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json

fragment:
  name: fifo-sim

  tasks:
  - local: ingress-fifo-img
    uses: hdlsim.vlt.SimImage
    with:
      top: [ingress_fifo_tb]
    needs:
    - org.fwvip.core.ingress-fifo
    - ingress-fifo-tb-src

  - root: ingress-fifo-sim
    uses: hdlsim.vlt.SimRun
    needs: [ingress-fifo-img]

  - local: ingress-fifo-tb-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include: [ingress_fifo_tb.sv]

  - local: egress-fifo-img
    uses: hdlsim.vlt.SimImage
    with:
      top: [egress_fifo_tb]
    needs:
    - org.fwvip.core.egress-fifo
    - egress-fifo-tb-src

  - root: egress-fifo-sim
    uses: hdlsim.vlt.SimRun
    needs: [egress-fifo-img]

  - local: egress-fifo-tb-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include: [egress_fifo_tb.sv]

  # ---- UVM clock/reset config tests ----
  - local: clkrst-uvm-img
    uses: hdlsim.vlt.SimImage
    with:
      top: [clkrst_uvm_tb]
    needs:
    - hdlsim.vlt.SimLibUVM
    - org.fwvip.core.clock-reset-xtor
    - org.fwvip.core.core-uvm-pkg
    - clkrst-uvm-tests-pkg
    - clkrst-uvm-tb-src

  - local: clkrst-uvm-tests-pkg
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include: [fwvip_core_clkrst_tests_pkg.sv]
      incdirs: [ "${{ srcdir }}" ]

  - local: clkrst-uvm-tb-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include: [clkrst_uvm_tb.sv]
      incdirs: [ "${{ srcdir }}" ]

  - root: clkrst-uvm-sim
    uses: hdlsim.vlt.SimRun
    needs: [clkrst-uvm-img]
    with:
      plusargs:
      - UVM_TESTNAME=fwvip_core_clkrst_test
